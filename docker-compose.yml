services:
  postgres:
    image: postgres:17-alpine
    container_name: promptcraft-postgres
    environment:
      POSTGRES_USER: promptcraft_user
      POSTGRES_PASSWORD: promptcraft_password
      POSTGRES_DB: promptcraft_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: